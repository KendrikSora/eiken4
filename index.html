const POS_LIST = ["すべて", "Section 10", "Section 11"];
const SECTIONS = [
  { key: "all", label: "全部 (200個)", range: [901, 1100] },
  { key: "s10", label: "Section 10 (0901–1000)", range: [901, 1000] },
  { key: "s11", label: "Section 11 (1001–1100)", range: [1001, 1100] },
];

const STORAGE_KEY = "eiken3_idiom_progress_v1";
function loadProgress() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function App() {
  const [screen, setScreen] = useState("home");
  const [progress, setProgress] = useState(loadProgress);
  const [sectionKey, setSectionKey] = useState("all");
  const [posFilter, setPosFilter] = useState("すべて");
  const [quizResult, setQuizResultState] = useState(null);
  const [quizPool, setQuizPool] = useState([]);
  const [quizMode, setQuizMode] = useState("e2j");
  const [quizLen, setQuizLen] = useState(10);

  React.useEffect(() => {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
  }, [progress]);

  const filteredWords = useMemo(() => {
    const sec = SECTIONS.find((s) => s.key === sectionKey);
    return WORDS.filter((w) => {
      const num = parseInt(w.id, 10);
      const inSec = num >= sec.range[0] && num <= sec.range[1];
      const inPos = posFilter === "すべて" || w.pos === posFilter;
      return inSec && inPos;
    });
  }, [sectionKey, posFilter]);

  const stats = useMemo(() => {
    let known = 0, learning = 0;
    WORDS.forEach((w) => {
      if (progress[w.id] === "known") known++;
      else if (progress[w.id] === "learning") learning++;
    });
    return { known, learning, total: WORDS.length };
  }, [progress]);

  const setWordStatus = (id, status) => setProgress((p) => ({ ...p, [id]: status }));

  return (
    <div style={styles.app}>
      <style>{globalCss}</style>
      <Header stats={stats} onHome={() => setScreen("home")} />
      <main style={styles.main}>
        {screen === "home" && (
          <Home stats={stats} onStudy={() => setScreen("study")} onQuiz={() => setScreen("quizSetup")}
            sectionKey={sectionKey} setSectionKey={setSectionKey} posFilter={posFilter} setPosFilter={setPosFilter}
            count={filteredWords.length}
            onReset={() => { if (confirm("学習の進み具合をすべてリセットします。よろしいですか？")) setProgress({}); }} />
        )}
        {screen === "study" && (
          <Study words={filteredWords} progress={progress} setWordStatus={setWordStatus} onBack={() => setScreen("home")} />
        )}
        {screen === "quizSetup" && (
          <QuizSetup count={filteredWords.length} quizMode={quizMode} setQuizMode={setQuizMode} quizLen={quizLen} setQuizLen={setQuizLen}
            onStart={() => { setQuizPool(buildQuiz(filteredWords, quizLen, quizMode)); setScreen("quiz"); }}
            onBack={() => setScreen("home")} />
        )}
        {screen === "quiz" && (
          <Quiz pool={quizPool} mode={quizMode} setWordStatus={setWordStatus}
            onFinish={(r) => { setQuizResultState(r); setScreen("quizResult"); }}
            onBack={() => setScreen("home")} />
        )}
        {screen === "quizResult" && (
          <QuizResult result={quizResult}
            onRetry={() => { setQuizPool(buildQuiz(filteredWords, quizLen, quizMode)); setScreen("quiz"); }}
            onReviewWrong={() => {
              const wrongIds = new Set(quizResult.wrong.map((w) => w.id));
              setQuizPool(buildQuiz(WORDS.filter((w) => wrongIds.has(w.id)), quizResult.wrong.length, quizMode));
              setScreen("quiz");
            }}
            onHome={() => setScreen("home")} />
        )}
      </main>
      <Footer />
    </div>
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuiz(words, len, mode) {
  const picked = shuffle(words).slice(0, Math.min(len, words.length));
  return picked.map((w) => {
    const others = WORDS.filter((x) => x.id !== w.id);
    const distractors = shuffle(others).slice(0, 3);
    const options = shuffle([w, ...distractors]).map((o) => ({ id: o.id, label: mode === "e2j" ? o.meaning : o.word }));
    return { prompt: mode === "e2j" ? w.word : w.meaning, sub: w.pos, answerId: w.id, options, word: w };
  });
}

function Study({ words, progress, setWordStatus, onBack }) {
  const [i, setI] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [order] = useState(() => shuffle(words));
  const w = order[i];
  if (!w) return null;
  const status = progress[w.id];

  const go = (dir) => {
    setFlipped(false);
    setTimeout(() => {
      setI((v) => { const n = v + dir; if (n < 0) return 0; if (n >= order.length) return order.length - 1; return n; });
    }, 120);
  };
  const mark = (st) => { setWordStatus(w.id, st); if (i < order.length - 1) go(1); };
  const learnedCount = order.filter((x) => progress[x.id] === "known").length;

  return (
    <div className="fade-in">
      <TopBar onBack={onBack} title="覚えるカード" />
      <div style={styles.progRow}>
        <span style={styles.progText}>{i + 1} / {order.length}</span>
        <div style={styles.progBar}><div style={{ ...styles.progBarFill, width: ((i + 1) / order.length) * 100 + "%" }} /></div>
        <span style={styles.progText}>✓{learnedCount}</span>
      </div>
      <div style={styles.cardScene} onClick={() => setFlipped((f) => !f)}>
        <div style={{ ...styles.flipCard, transform: flipped ? "rotateY(180deg)" : "none" }}>
          <div style={styles.faceFront}>
            <span style={styles.posTag}>{w.pos}</span>
            <div style={styles.cardWord}>{w.word}</div>
            {status && <span style={status === "known" ? styles.badgeKnown : styles.badgeLearn}>{status === "known" ? "✓ おぼえた" : "学習中"}</span>}
            <div style={styles.tapHint}>タップで意味を見る 👆</div>
          </div>
          <div style={styles.faceBack}>
            <div style={styles.backMeaning}>{w.meaning}</div>
            <div style={styles.backEx}>
              <div style={styles.backExEn}>▶ {w.ex}</div>
              <div style={styles.backExJa}>{w.exJa}</div>
            </div>
            {w.note && <div style={styles.backNote}>💡 {w.note}</div>}
            <div style={styles.tapHint}>タップで英語にもどる 👆</div>
          </div>
        </div>
      </div>
      <div style={styles.studyBtnRow}>
        <button onClick={() => mark("learning")} style={styles.btnLearn}>🔁 もう一回</button>
        <button onClick={() => mark("known")} style={styles.btnKnown}>✓ おぼえた！</button>
      </div>
      <div style={styles.navRow}>
        <button onClick={() => go(-1)} style={styles.navBtn} disabled={i === 0}>← 前</button>
        <button onClick={() => go(1)} style={styles.navBtn} disabled={i === order.length - 1}>次 →</button>
      </div>
    </div>
  );
}

function QuizSetup({ count, quizMode, setQuizMode, quizLen, setQuizLen, onStart, onBack }) {
  const lengths = [...new Set([10, 20, 30, Math.min(count, 50)].filter((l) => l <= count && l > 0))];
  return (
    <div className="fade-in">
      <TopBar onBack={onBack} title="確認テストの設定" />
      <section style={styles.card}>
        <h2 style={styles.cardTitle}>出題の形式</h2>
        <div style={styles.segGroup}>
          <button onClick={() => setQuizMode("e2j")} style={quizMode === "e2j" ? styles.segOn : styles.segOff}>熟語 → 意味</button>
          <button onClick={() => setQuizMode("j2e")} style={quizMode === "j2e" ? styles.segOn : styles.segOff}>意味 → 熟語</button>
        </div>
        <h2 style={{ ...styles.cardTitle, marginTop: 22 }}>問題数（対象 {count}個）</h2>
        <div style={styles.segWrap}>
          {lengths.map((l) => (
            <button key={l} onClick={() => setQuizLen(l)} style={quizLen === l ? styles.pillOn : styles.pillOff}>{l}問</button>
          ))}
        </div>
      </section>
      <button onClick={onStart} style={styles.startBtn} disabled={count === 0}>テストをはじめる →</button>
    </div>
  );
}

function Quiz({ pool, mode, setWordStatus, onFinish, onBack }) {
  const [i, setI] = useState(0);
  const [picked, setPicked] = useState(null);
  const [correctCount, setCorrectCount] = useState(0);
  const [wrong, setWrong] = useState([]);
  const q = pool[i];
  if (!q) return null;

  const choose = (optId) => {
    if (picked) return;
    setPicked(optId);
    if (optId === q.answerId) { setCorrectCount((c) => c + 1); setWordStatus(q.word.id, "known"); }
    else { setWrong((arr) => [...arr, q.word]); setWordStatus(q.word.id, "learning"); }
  };
  const advance = () => {
    if (i < pool.length - 1) { setI(i + 1); setPicked(null); }
    else { onFinish({ total: pool.length, correct: correctCount, wrong }); }
  };

  return (
    <div className="fade-in">
      <TopBar onBack={onBack} title={`テスト ${i + 1}/${pool.length}`} />
      <div style={styles.progRow}>
        <div style={styles.progBar}><div style={{ ...styles.progBarFill, width: (i / pool.length) * 100 + "%", background: "#1f7d76" }} /></div>
        <span style={{ ...styles.progText, color: "#1f7d76" }}>✓{correctCount}</span>
      </div>
      <div style={styles.quizPrompt}>
        <div style={styles.quizPromptSub}>{q.sub}</div>
        <div style={styles.quizPromptMain}>{q.prompt}</div>
        <div style={styles.quizQ}>{mode === "e2j" ? "意味は？" : "英語は？"}</div>
      </div>
      <div style={styles.optGrid}>
        {q.options.map((o) => {
          let st = styles.optBtn;
          if (picked) {
            if (o.id === q.answerId) st = styles.optCorrect;
            else if (o.id === picked) st = styles.optWrong;
            else st = styles.optDim;
          }
          return (
            <button key={o.id} onClick={() => choose(o.id)} style={st} disabled={!!picked}>
              {o.label}
              {picked && o.id === q.answerId && <span style={styles.optIcon}>✓</span>}
              {picked && o.id === picked && o.id !== q.answerId && <span style={styles.optIcon}>✕</span>}
            </button>
          );
        })}
      </div>
      {picked && (
        <div className="fade-in" style={styles.quizFeedback}>
          <div style={picked === q.answerId ? styles.fbCorrect : styles.fbWrong}>{picked === q.answerId ? "せいかい！🎉" : "おしい！もう一度かくにん 👇"}</div>
          <div style={styles.fbCard}>
            <b style={{ fontSize: 18 }}>{q.word.word}</b>
            <div style={{ marginTop: 4 }}>{q.word.meaning}</div>
            <div style={{ marginTop: 8, color: "#e85d2f", fontWeight: 600 }}>▶ {q.word.ex}</div>
            <div style={{ color: "#777", fontSize: 14 }}>{q.word.exJa}</div>
          </div>
          <button onClick={advance} style={styles.nextBig}>{i < pool.length - 1 ? "次の問題へ →" : "結果を見る 🏁"}</button>
        </div>
      )}
    </div>
  );
}

function QuizResult({ result, onRetry, onReviewWrong, onHome }) {
  if (!result) return null;
  const { total, correct, wrong } = result;
  const pct = Math.round((correct / total) * 100);
  let msg = "もう少し！くり返せば必ず覚えられるよ 💪", emoji = "🌱";
  if (pct === 100) { msg = "パーフェクト！すごい！🏆"; emoji = "🏆"; }
  else if (pct >= 80) { msg = "よくできました！この調子！⭐"; emoji = "🌟"; }
  else if (pct >= 60) { msg = "いい感じ！あと一歩！👍"; emoji = "😊"; }

  return (
    <div className="fade-in">
      <section style={{ ...styles.card, textAlign: "center", paddingTop: 36 }}>
        <div style={{ fontSize: 56 }}>{emoji}</div>
        <div style={styles.resultScore}>{correct} <span style={{ fontSize: 26, color: "#bbb" }}>/ {total}</span></div>
        <div style={styles.resultPct}>正答率 {pct}%</div>
        <div style={styles.resultMsg}>{msg}</div>
      </section>
      {wrong.length > 0 && (
        <section style={styles.card}>
          <h2 style={styles.cardTitle}>🔁 まちがえた熟語（{wrong.length}）</h2>
          {wrong.map((w) => (
            <div key={w.id} style={styles.wrongRow}>
              <div>
                <b style={{ fontSize: 16 }}>{w.word}</b>
                <div style={{ fontSize: 14, color: "#555" }}>{w.meaning}</div>
              </div>
            </div>
          ))}
        </section>
      )}
      <div style={styles.actionGrid}>
        {wrong.length > 0 && (
          <button onClick={onReviewWrong} style={{ ...styles.startBtn, background: "linear-gradient(135deg,#ff8a5c,#e85d2f)", margin: 0 }}>まちがえた{wrong.length}問だけ再挑戦</button>
        )}
        <button onClick={onRetry} style={{ ...styles.startBtn, margin: 0 }}>もう一度テスト</button>
      </div>
      <button onClick={onHome} style={styles.resetBtn}>ホームにもどる</button>
    </div>
  );
}

function TopBar({ onBack, title }) {
  return (
    <div style={styles.topBar}>
      <button onClick={onBack} style={styles.backBtn}>←</button>
      <span style={styles.topTitle}>{title}</span>
      <span style={{ width: 40 }} />
    </div>
